# ============================================
# Docker Compose 基础配置
# 本地开发: docker compose up -d (Server 在本地运行)
# 生产部署: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:
  # Server 服务（生产环境启用，本地开发禁用）
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    profiles:
      - prod
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DOCKER_SOCKET=/var/run/docker.sock
      - DOCKER_ENV=true
      - NGINX_WORKSPACES_DIR=/etc/nginx/workspaces
      - CLAUDE_CONFIG_DIR=/data/workspaces/system/claude-config
      - SHELL=/bin/bash
      - HOST_IP=${HOST_IP:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/workspaces:/data/workspaces
      - ~/.ssh:/root/.ssh:ro
      - ${SHARED_SSH_DIR:-/data/shared-ssh}:/data/shared-ssh:ro
      - nginx-workspaces:/etc/nginx/workspaces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:' + (process.env.PORT || 3001) + '/ai_mule/web_api/v1/health/ping', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - ai-mule-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_DATABASE:-ai_mule_server}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ai-mule-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-mule-network
    restart: unless-stopped

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - nginx-workspaces:/etc/nginx/workspaces
    networks:
      - ai-mule-network
    restart: unless-stopped

networks:
  ai-mule-network:
    external: true
    name: ai-mule-network

volumes:
  mysql-data:
  redis-data:
  nginx-workspaces:
